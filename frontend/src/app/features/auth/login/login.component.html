<div class="min-h-screen flex items-center justify-center bg-slate-950 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-slate-900 p-8 rounded-2xl shadow-2xl border border-slate-800/80">
      
      <div class="text-center">
        <div class="mx-auto h-12 w-12 rounded-xl bg-emerald-500 flex items-center justify-center shadow-lg shadow-emerald-500/20">
          <svg class="h-6 w-6 text-slate-950" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
          </svg>
        </div>
        <h2 class="mt-6 text-3xl font-extrabold text-white tracking-tight">Forrajería El Trébol</h2>
        <p class="mt-2 text-sm text-slate-400">Sistema de Gestión de Inventario y Caja</p>
      </div>
  
      <div *ngIf="errorMessage" class="bg-red-500/10 border border-red-500/20 text-red-400 p-4 rounded-xl text-sm flex items-center gap-3 animate-fade-in">
        <svg class="h-5 w-5 shrink-0 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>
  
      <form class="mt-6 space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="space-y-4">
          
          <div>
            <label for="email" class="block text-sm font-medium text-slate-300 mb-1">Correo Electrónico</label>
            <input id="email" formControlName="email" type="email" autocomplete="email" required
              class="input-focus-effect appearance-none relative block w-full px-4 py-3 border border-slate-700 bg-slate-800/40 text-white placeholder-slate-500 rounded-xl focus:outline-none focus:border-emerald-500 transition-all text-sm"
              placeholder="operario@forrajería.com">
          </div>
  
          <div>
            <label for="password" class="block text-sm font-medium text-slate-300 mb-1">Contraseña</label>
            <input id="password" formControlName="password" type="password" autocomplete="current-password" required
              class="input-focus-effect appearance-none relative block w-full px-4 py-3 border border-slate-700 bg-slate-800/40 text-white placeholder-slate-500 rounded-xl focus:outline-none focus:border-emerald-500 transition-all text-sm"
              placeholder="••••••••">
          </div>
        </div>
  
        <div>
          <button type="submit" [disabled]="loginForm.invalid || isLoading"
            class="inject-btn group relative w-full flex justify-center py-3 px-4 text-sm font-semibold rounded-xl text-slate-950 bg-emerald-400 hover:bg-emerald-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-emerald-400 transition-all disabled:opacity-40 disabled:cursor-not-allowed shadow-lg shadow-emerald-400/10">
            
            <span *ngIf="!isLoading" class="flex items-center gap-2">
              Ingresar al Sistema
              <svg class="h-4 w-4 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/>
              </svg>
            </span>
  
            <span *ngIf="isLoading" class="flex items-center gap-2">
              <svg class="animate-spin h-5 w-5 text-slate-950" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Validando credenciales...
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
