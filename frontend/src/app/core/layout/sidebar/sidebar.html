<div class="flex flex-col h-screen w-64 bg-slate-950 border-r border-slate-900 p-4 justify-between">
  
  <div class="space-y-6">
    <div class="px-2">
      <h2 class="text-xl font-black text-emerald-500 tracking-wider">FORRAJERÍA</h2>
    </div>

    <nav class="space-y-1" *ngIf="checkLoginStatus()">
      <a *ngFor="let link of navLinks" 
         [routerLink]="link.route" 
         routerLinkActive="bg-slate-900 text-emerald-400 border-emerald-500"
         [routerLinkActiveOptions]="{ exact: true }"
         class="flex items-center px-4 py-3 text-sm font-semibold text-slate-400 hover:bg-slate-900/50 hover:text-white rounded-xl border border-transparent transition-all cursor-pointer">
        {{ link.label }}
      </a>
    </nav>
  </div>

  <div *ngIf="checkLoginStatus()" class="border-t border-slate-900 pt-4">
    <button (click)="onLogout()" class="w-full flex items-center px-4 py-3 text-sm font-semibold text-rose-400 hover:bg-rose-500/10 rounded-xl transition-all cursor-pointer">
      Cerrar Sesión
    </button>
  </div>

</div>
